name: Mis à jour index.json - auto

on:
  pull_request:
    branches:
      - main

jobs:
  maj-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - name: Récupération du pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Installation de python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancement des scripts
        run: python .github/scripts/index.py

      - name: Ajout du commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add index.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore: update index.json"
          git push